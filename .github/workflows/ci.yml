name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bazel:
    name: Bazel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build public jars
        run: ./bazelw build //client:client //server:server

      - name: Run tests
        run: ./bazelw test //...

      - name: Check Bazel formatting
        run: ./bazelw run //:buildifier_check
