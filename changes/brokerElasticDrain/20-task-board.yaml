  - id: T1
    title: Refactor broker API and add session pending-packet helper
    status: completed
    priority: high
    depends_on:
      - T6
    acceptance_criteria:
      - "`ReplicantMessageBroker.processPendingSessions()` is removed."
      - "Production callers still compile against `queueChangeMessage(...)`."
      - "`ReplicantSession` exposes package-private `hasPendingPackets()`."
      - Existing broker tests no longer depend on the removed manual drain API.
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantMessageBroker.java
      - server/src/main/java/replicant/server/transport/ReplicantSession.java
      - server/src/test/java/replicant/server/transport/ReplicantMessageBrokerImplTest.java
    evidence:
      - command: "Implementation"
        result: "Removed `processPendingSessions()` from `ReplicantMessageBroker`, added `ReplicantSession.hasPendingPackets()`, and rewrote broker tests away from manual drain calls."
    commit:
      hash: not_required
      message: not_required

  - id: T2
    title: Add broker config resolution and validation
    status: completed
    priority: high
    depends_on:
      - T1
    acceptance_criteria:
      - Broker resolves max concurrent drain tasks, packets per run, and sessions per task at startup.
      - Broker uses explicit JNDI lookup of `java:comp/env/<entry>` with defaults for missing entries.
      - "`NameNotFoundException` for one entry uses that entry's default."
      - "`NoInitialContextException` uses defaults for unresolved entries in unmanaged/test execution."
      - "Other `NamingException` failures fail startup with useful messages."
      - Broker accepts numeric and string values.
      - Missing config uses defaults.
      - Wrong-type, non-numeric, zero, and negative config values fail startup with useful messages.
      - Tests cover defaults, numeric values, string values, missing entries, no initial context, naming failure, wrong types, non-numeric strings, and invalid values.
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantMessageBrokerImpl.java
      - server/src/test/java/replicant/server/transport/ReplicantMessageBrokerImplTest.java
    evidence:
      - command: "Implementation"
        result: "Added startup JNDI config resolution, defaults, value parsing, and failure handling for broker scheduler limits."
      - command: "Implementation review round 1 fix"
        result: "Added explicit negative-value configuration coverage."
    commit:
      hash: not_required
      message: not_required

  - id: T3
    title: Implement demand-driven drain-task scheduling
    status: completed
    priority: high
    depends_on:
      - T2
      - T6
    acceptance_criteria:
      - Fixed-rate scheduled polling is removed.
      - "`queueChangeMessage(...)` schedules drain tasks after enqueueing."
      - Active drain task accounting uses atomic reservation and respects `maxConcurrentDrainTasks` under concurrent enqueue.
      - Executor submission failure rolls back accounting, keeps work queued, and schedules one coalesced delayed retry when not stopping.
      - Delayed retry uses a 20ms default delay and one outstanding retry guard.
      - Delayed retry callbacks no-op when stopping or when the queue is empty.
      - Tests prove scheduling, concurrent reservation, and submission-failure behavior.
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantMessageBrokerImpl.java
      - server/src/test/java/replicant/server/transport/ReplicantMessageBrokerImplTest.java
    evidence:
      - command: "Implementation"
        result: "Replaced fixed-rate polling with queue-driven drain-task submission, atomic active-task reservation, and coalesced delayed retry handling."
      - command: "Implementation review round 1 fix"
        result: "Changed active drain task reservation to cap against tracked session work states rather than raw queue depth, preserving same-session coalescing while allowing new-session work to scale when another session is already running."
    commit:
      hash: not_required
      message: not_required

  - id: T4
    title: Implement coalesced session state and bounded processing
    status: completed
    priority: high
    depends_on:
      - T3
    acceptance_criteria:
      - Broker coalesces outer session wakeups with `QUEUED` and `RUNNING` states.
      - Workers claim sessions atomically.
      - Workers process at most `maxPacketsPerRun` packets per session claim.
      - Drain tasks process at most `maxSessionsPerDrainTask` sessions.
      - Sessions with remaining packets are requeued at the tail.
      - A drain task does not reclaim the same session after requeueing it due to `maxPacketsPerRun`.
      - Tests cover coalescing, batch limits, task limits, and no duplicate same-session processing.
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantMessageBrokerImpl.java
      - server/src/test/java/replicant/server/transport/ReplicantMessageBrokerImplTest.java
    evidence:
      - command: "Implementation"
        result: "Added queued/running work-state transitions, per-session packet limits, per-task session limits, and same-session reclaim prevention within one drain task."
    commit:
      hash: not_required
      message: not_required

  - id: T5
    title: Add lock-contention, closed-session, failure, and lifecycle handling
    status: completed
    priority: high
    depends_on:
      - T4
    acceptance_criteria:
      - "Lock contention uses `tryLock()` and tail requeue."
      - A lock-contention-only drain pass schedules one coalesced delayed retry rather than a tight immediate reschedule loop.
      - Closed sessions are removed from broker state and skipped.
      - "Sessions closed by `sendChangeMessage(...)` mid-batch are not processed further and are not requeued."
      - Packet processing failures close only the affected session and continue the drain task.
      - "`preDestroy()` sets stopping, prevents future submissions, and allows active tasks to finish accounting normally."
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantMessageBrokerImpl.java
      - server/src/test/java/replicant/server/transport/ReplicantMessageBrokerImplTest.java
    evidence:
      - command: "Implementation"
        result: "Added tryLock requeue, closed-session removal, mid-batch closure handling, packet failure isolation, delayed retry failure handling, and preDestroy stopping."
      - command: "Implementation review round 1 fix"
        result: "Added coverage for delayed retry callbacks no-oping when stopping or empty, and for packet failure not poisoning the rest of a single drain task."
    commit:
      hash: not_required
      message: not_required

