      - changes/partialChannelLinks/00-requirements.md
      - changes/partialChannelLinks/10-implementation-plan.md
      - changes/partialChannelLinks/20-task-board.yaml
    evidence:
      - command: "Implemented provenance-aware downstream link ownership in SubscriptionEntry and ReplicantSession"
        result: "Added graph-scoped and entity-scoped link owners, per-owner downstream target tracking, and aggregate reference counts so shared targets are only delinked when the last owner releases them."
      - command: "Tightened the graph-scoped recordGraphLink contract"
        result: "The public ReplicantSession.recordGraphLink API now asserts concrete addresses, requires a concrete type-graph target, and documents the downstream usage contract in Javadoc."
      - command: "bundle exec buildr clean replicant:server:test"
        result: "Passed. Server: 162 tests."
    commit:
      hash: not_required
      message: not_required

  - id: T10
    title: Refactor update/delete processing to use provenance-aware graph-link ownership
    status: completed
    priority: high
    depends_on:
      - T9
    acceptance_criteria:
      - Update processing diffs entity-owned targets rather than only adding links.
      - Delete processing removes only entity-owned targets for the deleted entity.
      - Graph-scoped links to target type graphs without an entity source remain representable and tested.
    files_touched:
      - server/src/main/java/replicant/server/transport/ReplicantSessionManagerImpl.java
      - server/src/test/java/replicant/server/transport/ReplicantSessionManagerImplTest.java
      - server/src/test/java/replicant/server/transport/ReplicantSessionTest.java
      - changes/partialChannelLinks/20-task-board.yaml
    evidence:
      - command: "Refactored update/delete link processing in ReplicantSessionManagerImpl"
        result: "Entity updates now diff the full current entity-owned downstream link set against prior ownership, deletes release only the deleted entity's ownership, and graph-scoped links remain representable without an entity source."
      - command: "bundle exec buildr test"
        result: "Passed. Full gate completed successfully. Client: 442 tests. Server: 162 tests."
    commit:
      hash: not_required
      message: not_required
