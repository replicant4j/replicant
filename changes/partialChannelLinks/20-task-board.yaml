  - id: T9
    title: Introduce provenance-aware graph-link tracking
    status: completed
    priority: high
    depends_on:
      - T8
    acceptance_criteria:
      - Session graph-link tracking distinguishes graph-scoped and entity-scoped ownership.
      - Existing graph-scoped link APIs remain supported.
      - Multiple entity owners can reference the same downstream target without premature delink.
    files_touched:
      - server/src/main/java/replicant/server/transport/EntityReference.java
      - server/src/main/java/replicant/server/transport/LinkOwner.java
      - server/src/main/java/replicant/server/transport/ChannelLinkEntry.java
